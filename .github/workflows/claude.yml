name: Copilot Code

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened]

jobs:
  copilot:
    if: |
      (github.event_name == 'issue_comment' &&
       contains(github.event.comment.body, '@copilot')) ||
      (github.event_name == 'pull_request_review_comment' &&
       contains(github.event.comment.body, '@copilot')) ||
      (github.event_name == 'issues' &&
       (contains(github.event.issue.body, '@copilot') ||
        contains(github.event.issue.title, '@copilot')))
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Run Copilot Code
        uses: github/copilot-action@v1
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
